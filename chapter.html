<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chapter • Montafon Moonlight</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />

  <!-- Default Open Graph / Twitter Card -->
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Montafon Moonlight">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    :root {
      --bg: #ffffff;
      --text: #1a232b;
      --muted: #5b6b77;
      --card: #f7fafb;
      --border: #e3e9ed;
      --accent: #3d5f7a;
      --link: #3d5f7a;
    }

    html[data-theme="dark"] {
      --bg: #0c151d;
      --text: #e7edf1;
      --muted: #93a7b5;
      --card: #13202b;
      --border: #24394a;
      --accent: #3d5f7a;
      --link: #a8cbdf;
    }

    html,
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    header.stickybar {
      position: sticky;
      top: 0;
      z-index: 40;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.2;
    }

    .chapter-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 1rem 1.25rem 1.25rem;
    }

    .meta {
      color: var(--muted);
    }

    .chapter-title {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
      line-height: 1.15;
      margin-bottom: .4rem;
    }

    .gdoc {
      font-size: 1.02rem;
    }

    .gdoc p {
      margin: 1em 0;
      line-height: 1.8;
    }

    .gdoc em,
    .gdoc i {
      font-style: italic;
    }

    .gdoc a.glossary-term {
      color: var(--text);
      border-bottom: 1px dotted var(--accent);
      text-decoration: none;
    }

    .gdoc a.glossary-term:hover,
    .gdoc a.glossary-term:focus {
      color: var(--link);
      border-bottom-style: solid;
      background: var(--card);
      outline: none;
    }

    #heroBlock[hidden] {
      display: none;
    }

    #heroImg {
      max-width: min(680px, 100%) !important;
      width: auto !important;
      height: auto !important;
      display: block !important;
      margin: 1.25rem auto .5rem !important;
      border-radius: 8px !important;
    }

    #heroCaption {
      color: var(--muted);
      font-size: .875rem;
      text-align: center;
    }

    #contentRoot img,
    #contentRoot figure img,
    #contentRoot * img {
      max-width: min(680px, 100%) !important;
      width: auto !important;
      height: auto !important;
      display: block !important;
      margin: 1.5rem auto !important;
      border-radius: 6px !important;
    }

    #contentRoot [id] {
      scroll-margin-top: 6rem;
    }

  </style>

  <!-- Dynamic Open Graph / Twitter Injection -->
  <script>
  (async () => {
    try {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");
      if (!slug) return;

      const res = await fetch("chapters.json?"+Date.now());
      const chapters = await res.json();
      const ch = chapters.find(c => c.slug === slug);
      if (!ch) return;

      const base = "https://omatty123.github.io/MontafonMoonlight/";
      const title = `Montafon Moonlight – ${ch.title}`;
      const desc = ch.summary.replace(/<[^>]*>/g, "");
      const image = base + ch.cover;
      const url = base + ch.href;

      const addMeta = (key, val, byName=false) => {
        const sel = byName ? `meta[name='${key}']` : `meta[property='${key}']`;
        let el = document.querySelector(sel);
        if (!el) {
          el = document.createElement("meta");
          el.setAttribute(byName ? "name" : "property", key);
          document.head.appendChild(el);
        }
        el.setAttribute("content", val);
      };

      addMeta("og:title", title);
      addMeta("og:description", desc);
      addMeta("og:image", image);
      addMeta("og:url", url);
      addMeta("twitter:title", title, true);
      addMeta("twitter:description", desc, true);
      addMeta("twitter:image", image, true);
      document.title = title;
    } catch(e){ console.error("OG meta failed", e); }
  })();
  </script>
</head>

<body>
  <!-- Header -->
  <header class="stickybar">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="brand"><a href="index.html" style="color:var(--text);">Montafon Moonlight</a></h1>
      <button id="theme-toggle" class="p-1 rounded border meta" aria-label="Toggle dark mode">
        <span aria-hidden="true">☾</span>
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="chapter-wrap">
    <nav class="text-sm meta mb-3" aria-label="Breadcrumb">
      <a href="index.html" class="hover:underline">Home</a> <span aria-hidden="true">›</span>
      <span id="crumbTitle">Chapter</span>
    </nav>

    <header class="mb-3">
      <p id="chapterNumber" class="text-sm meta font-semibold mb-1" style="text-transform:uppercase; letter-spacing:.12em; font-size:.75rem;">Chapter</p>
      <h2 id="chapterTitle" class="chapter-title">Loading…</h2>
      <div class="text-sm meta flex flex-wrap gap-x-4 gap-y-2 items-center">
        <span><time id="pubDate" datetime="">—</time></span>
      </div>
    </header>

    <figure id="heroBlock" hidden class="mb-6">
      <img id="heroImg" src="" alt="Chapter image">
      <figcaption id="heroCaption"></figcaption>
    </figure>

    <article id="contentRoot" class="gdoc"></article>

    <nav class="mt-10 flex items-center justify-between text-sm">
      <a id="prevLink" href="index.html" class="hover:underline">← Previous</a>
      <a id="nextLink" href="index.html" class="hover:underline">Next →</a>
    </nav>

    <footer class="border-t mt-10 pt-5" style="border-color:var(--border);">
      <p class="text-center text-sm meta">Translation © <span id="copyYear"></span></p>
    </footer>
  </main>

  <!-- Script -->
  <script>
    /* Theme toggle */
    (function () {
      const KEY = "theme", root = document.documentElement, btn = document.getElementById("theme-toggle");
      function apply(t) { t === "dark" ? root.setAttribute("data-theme", "dark") : root.removeAttribute("data-theme"); }
      function initial() { const s = localStorage.getItem(KEY); if (s === "dark" || s === "light") return s; return matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"; }
      function reflect(t) { if (!btn) return; btn.setAttribute("aria-pressed", t === "dark" ? "true" : "false"); btn.querySelector("span").textContent = t === "dark" ? "☀" : "☾"; }
      let cur = initial(); apply(cur); reflect(cur);
      matchMedia("(prefers-color-scheme: dark)").addEventListener?.("change", e => { if (localStorage.getItem(KEY)) return; cur = e.matches ? "dark" : "light"; apply(cur); reflect(cur); });
      btn?.addEventListener("click", () => { cur = cur === "dark" ? "light" : "dark"; localStorage.setItem(KEY, cur); apply(cur); reflect(cur); });
    })();

    const fmtLong = (d) => {
      const [y, m, day] = String(d).split("-").map(Number);
      return new Date(y, m - 1, day).toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" });
    };
    async function loadChapters() { try { const r = await fetch("chapters.json?v=" + Date.now(), { cache: "no-store" }); if (!r.ok) throw 0; return await r.json(); } catch (e) { return []; } }
    async function loadHtml(url) { try { const r = await fetch(url + (url.includes("?") ? "&" : "?") + "v=" + Date.now(), { cache: "no-store" }); return r.ok ? (await r.text()) : ""; } catch (e) { return ""; } }
    function extractBody(html) { const m = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i); return m && m[1] ? m[1] : html; }
    function normalizeImages(scope) { scope.querySelectorAll("img").forEach(img => { img.removeAttribute("width"); img.removeAttribute("height"); img.loading = img.loading || "lazy"; }); }

    const GLOSSARY_TERMS = [
      { id: "jeong", label: "jeong", script: "정", matches: ["jeong"], definition: "Warm, binding Korean affection: a gift of the heart, given and received." },
      { id: "inyeon", label: "inyeon", script: "인연", matches: ["inyeon"], definition: "Karmic connection: the causes and conditions that make a meeting feel destined rather than accidental." },
      { id: "hwadu", label: "hwadu", script: "화두", matches: ["hwadu"], definition: "A Seon meditation question held without a fixed answer." },
      { id: "samadhi", label: "samadhi", script: "삼매", matches: ["samadhi"], definition: "Absorbed meditative concentration." },
      { id: "gong-kong", label: "gong / kong", script: "공", matches: ["gong", "kong"], definition: "Emptiness: not a void, but fullness beyond ordinary grasping." },
      { id: "jeongmyeol", label: "jeongmyeol", script: "적멸", matches: ["jeongmyeol"], definition: "Absolute stillness: the extinction of afflictions." },
      { id: "musoyu", label: "musoyu", script: "무소유", matches: ["musoyu"], definition: "Non-possession, the teaching associated with Venerable Beopjeong." },
      { id: "jajak-jasu", label: "jajak jasu", script: "자작자수", matches: ["jajak jasu"], definition: "One reaps what one sows." },
      { id: "ingwa-eungbo", label: "ingwa eungbo", script: "인과응보", matches: ["ingwa eungbo"], definition: "The law that cause precedes effect, and that deeds return in kind." },
      { id: "hanbok-jeogori", label: "hanbok", script: "한복", matches: ["hanbok", "jeogori"], plainMatches: ["hanbok"], definition: "Traditional Korean clothing." },
      { id: "cheongsim-hwan", label: "cheongsim-hwan", script: "청심환", matches: ["cheongsim-hwan"], definition: "A traditional heart-calming herbal pill." },
      { id: "ten-ox-herding-pictures", label: "Ten Ox-Herding Pictures", script: "십우도", matches: ["ten ox-herding pictures", "ten oxherding pictures"], definition: "Ten Seon images for the stages of seeking and returning with truth." }
    ];

    const TERM_BY_ID = Object.fromEntries(GLOSSARY_TERMS.map(term => [term.id, term]));

    function annotateGlossaryLink(link, term) {
      link.classList.add("glossary-term");
      link.title = `${term.label}: ${term.definition}`;
      link.setAttribute("aria-label", `Glossary: ${term.label}. ${term.definition}`);
    }

    function enhanceGlossaryTerms(scope) {
      const found = new Map();
      scope.querySelectorAll('a[href^="glossary.html#"]').forEach(link => {
        const id = link.getAttribute("href").split("#")[1];
        const term = TERM_BY_ID[id];
        if (!term) return;
        annotateGlossaryLink(link, term);
        found.set(id, term);
      });

      scope.querySelectorAll("em").forEach(em => {
        if (em.closest("a")) return;
        const text = em.textContent.trim();
        const normalized = text.toLowerCase();
        const term = GLOSSARY_TERMS.find(item => item.matches.includes(normalized));
        if (!term || found.has(term.id)) return;
        const link = document.createElement("a");
        link.href = `glossary.html#${term.id}`;
        annotateGlossaryLink(link, term);
        em.replaceWith(link);
        link.appendChild(em);
        found.set(term.id, term);
      });

      GLOSSARY_TERMS.forEach(term => {
        if (found.has(term.id) || !term.plainMatches) return;
        const walker = document.createTreeWalker(scope, NodeFilter.SHOW_TEXT, {
          acceptNode(node) {
            const parent = node.parentElement;
            if (!parent || parent.closest("a, script, style")) return NodeFilter.FILTER_REJECT;
            return term.plainMatches.some(match => new RegExp(`\\b${match}\\b`, "i").test(node.nodeValue))
              ? NodeFilter.FILTER_ACCEPT
              : NodeFilter.FILTER_SKIP;
          }
        });
        const node = walker.nextNode();
        if (!node) return;
        const match = term.plainMatches.find(item => new RegExp(`\\b${item}\\b`, "i").test(node.nodeValue));
        if (!match) return;
        const regex = new RegExp(`\\b${match}\\b`, "i");
        const matchResult = node.nodeValue.match(regex);
        if (!matchResult) return;
        const start = matchResult.index;
        const end = start + matchResult[0].length;
        const before = document.createTextNode(node.nodeValue.slice(0, start));
        const after = document.createTextNode(node.nodeValue.slice(end));
        const link = document.createElement("a");
        link.href = `glossary.html#${term.id}`;
        annotateGlossaryLink(link, term);
        link.textContent = matchResult[0];
        node.parentNode.insertBefore(before, node);
        node.parentNode.insertBefore(link, node);
        node.parentNode.insertBefore(after, node);
        node.remove();
        found.set(term.id, term);
      });

    }

    (async function main() {
      document.getElementById("copyYear").textContent = new Date().getFullYear();

      const list = await loadChapters();
      list.sort((a, b) => new Date(a.date) - new Date(b.date));

      const slug = new URLSearchParams(location.search).get("slug");
      let idx = list.findIndex(c => c.slug === slug);
      if (idx < 0) idx = 0;
      const ch = list[idx] || {};
      const chapterNumber = idx + 1;
      document.getElementById("chapterNumber").textContent = `Chapter ${chapterNumber}`;

      if (ch.slug === "cheonmaneyo") {
        document.getElementById("chapterTitle").innerHTML = "“<em>Cheonmaneyo</em>”";
        document.getElementById("crumbTitle").innerHTML = "“<em>Cheonmaneyo</em>”";
      } else {
        document.getElementById("chapterTitle").innerHTML = ch.title || "Chapter";
        document.getElementById("crumbTitle").innerHTML = ch.title || "Chapter";
      }

      if (ch.date) {
        const el = document.getElementById("pubDate");
        el.dateTime = ch.date;
        el.textContent = fmtLong(ch.date);
      }

      if (ch.hero) {
        const fig = document.getElementById("heroBlock");
        fig.hidden = false;
        document.getElementById("heroImg").src = ch.hero;
        document.getElementById("heroCaption").innerHTML = "<em>Illustration by artist Jeong Yun-gyeong</em>";
      }

      let html = "";
      if (ch.contentHtml) html = await loadHtml(ch.contentHtml);
      html = extractBody(html);
      const root = document.getElementById("contentRoot");
      root.innerHTML = html || "<p>Chapter content coming soon.</p>";
      normalizeImages(root);
      enhanceGlossaryTerms(root);
      if (location.hash) {
        const hashId = decodeURIComponent(location.hash.slice(1));
        const target = hashId ? document.getElementById(hashId) : null;
        if (target && root.contains(target)) {
          requestAnimationFrame(() => target.scrollIntoView({ block: "start" }));
        }
      }

      const prev = list[idx - 1], next = list[idx + 1];
      const prevEl = document.getElementById("prevLink");
      const nextEl = document.getElementById("nextLink");
      if (prev) { prevEl.href = prev.href || ("chapter.html?slug=" + encodeURIComponent(prev.slug)); prevEl.innerHTML = `← ${prev.title}`; }
      else { prevEl.href = "index.html"; prevEl.innerHTML = `← Home`; }
      if (next) { nextEl.href = next.href || ("chapter.html?slug=" + encodeURIComponent(next.slug)); nextEl.innerHTML = `${next.title} →`; }
      else { nextEl.href = "index.html"; nextEl.innerHTML = `Index →`; }

    })();
  </script>
</body>

</html>
