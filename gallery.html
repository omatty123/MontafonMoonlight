<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gallery • Montafon Moonlight</title>

  <meta name="description" content="A visual gallery of the chapter illustrations from Montafon Moonlight." />
  <meta property="og:title" content="Gallery • Montafon Moonlight" />
  <meta property="og:description" content="A visual gallery of the chapter illustrations from Montafon Moonlight." />
  <meta property="og:image" content="https://omatty123.github.io/MontafonMoonlight/assets/ch45-cover.jpg" />
  <meta property="og:url" content="https://omatty123.github.io/MontafonMoonlight/gallery.html" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://omatty123.github.io/MontafonMoonlight/assets/ch45-cover.jpg" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #fbfaf7;
      --text: #172026;
      --muted: #66737c;
      --border: rgba(23, 32, 38, .16);
      --overlay: rgba(11, 18, 32, .72);
      --link: #315f73;
    }

    html[data-theme="dark"] {
      --bg: #0c1116;
      --text: #eef3f5;
      --muted: #9aabb4;
      --border: rgba(238, 243, 245, .16);
      --overlay: rgba(5, 10, 15, .78);
      --link: #9cc8d6;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(16px);
    }

    .topbar-inner {
      max-width: 1220px;
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      color: var(--text);
      font-weight: 700;
      letter-spacing: 0;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .theme-button {
      min-width: 34px;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 15px;
    }

    .wrap {
      max-width: 1220px;
      margin: 0 auto;
      padding: 28px 18px 54px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 72px);
      line-height: .98;
      letter-spacing: 0;
    }

    .intro {
      margin: 16px 0 30px;
      color: var(--muted);
      max-width: 66ch;
      line-height: 1.65;
      font-size: 16px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 10px;
      align-items: stretch;
    }

    .tile {
      position: relative;
      display: block;
      min-height: 220px;
      grid-column: span 4;
      overflow: hidden;
      border-radius: 8px;
      background: #d8dedf;
      border: 1px solid var(--border);
      isolation: isolate;
    }

    .tile:nth-child(7n + 1),
    .tile:nth-child(9n + 4) {
      grid-column: span 6;
      min-height: 300px;
    }

    .tile:nth-child(11n + 6) {
      grid-column: span 8;
      min-height: 330px;
    }

    .tile img {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
      object-fit: cover;
      display: block;
      transform: scale(1.01);
      transition: transform .35s ease, filter .35s ease;
    }

    .tile::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 45%, rgba(0, 0, 0, .54));
      opacity: .72;
      transition: opacity .25s ease;
      z-index: 1;
    }

    .tile:hover img { transform: scale(1.055); filter: saturate(1.05); }
    .tile:hover::after { opacity: .9; }

    .caption {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 2;
      color: #fff;
      text-shadow: 0 1px 8px rgba(0, 0, 0, .45);
    }

    .caption strong {
      display: block;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
    }

    .caption span {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      opacity: .88;
      line-height: 1.25;
    }

    .empty {
      padding: 36px 0;
      color: var(--muted);
    }

    footer {
      max-width: 1220px;
      margin: 0 auto;
      padding: 0 18px 34px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .tile,
      .tile:nth-child(7n + 1),
      .tile:nth-child(9n + 4),
      .tile:nth-child(11n + 6) {
        grid-column: span 6;
        min-height: 240px;
      }
    }

    @media (max-width: 620px) {
      .topbar-inner { align-items: flex-start; }
      .nav { gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
      .wrap { padding-top: 22px; }
      .gallery { grid-template-columns: 1fr; gap: 12px; }
      .tile,
      .tile:nth-child(7n + 1),
      .tile:nth-child(9n + 4),
      .tile:nth-child(11n + 6) {
        grid-column: 1;
        min-height: 285px;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="index.html">Montafon Moonlight</a>
      <div class="nav" aria-label="Site navigation">
        <a href="read.html">Read</a>
        <a href="index.html">Chapters</a>
        <a href="places.html">Places</a>
        <button id="theme-toggle" class="theme-button" type="button" aria-label="Toggle dark mode">☾</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <p class="eyebrow">Chapter Images</p>
    <h1>Gallery</h1>
    <p class="intro">
      A visual walk through the first forty-five chapters of <em>Montafon Moonlight</em>.
      Each image opens its chapter.
    </p>
    <div id="gallery" class="gallery" aria-live="polite"></div>
  </main>

  <footer>
    <a href="index.html">Home</a> ·
    <a href="authors/jeong-chanju.html">About the Author</a> ·
    <a href="cast.html">Cast of Characters</a> ·
    <a href="glossary.html">Glossary</a>
  </footer>

  <script>
    (function () {
      const KEY = "theme";
      const root = document.documentElement;
      const btn = document.getElementById("theme-toggle");
      function apply(theme) {
        theme === "dark" ? root.setAttribute("data-theme", "dark") : root.removeAttribute("data-theme");
        btn.textContent = theme === "dark" ? "☀" : "☾";
      }
      let current = localStorage.getItem(KEY) || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      apply(current);
      btn.addEventListener("click", () => {
        current = current === "dark" ? "light" : "dark";
        localStorage.setItem(KEY, current);
        apply(current);
      });
    })();

    function stripHtml(text) {
      const tmp = document.createElement("span");
      tmp.innerHTML = text || "";
      return tmp.textContent || tmp.innerText || "";
    }

    function imagePath(path) {
      return String(path || "").split("?")[0];
    }

    async function renderGallery() {
      const target = document.getElementById("gallery");
      let chapters = [];
      try {
        const response = await fetch("chapters.json?v=" + Date.now(), { cache: "no-store" });
        chapters = await response.json();
      } catch (error) {
        console.error("Failed to load chapters.json", error);
      }

      if (!Array.isArray(chapters) || !chapters.length) {
        target.innerHTML = '<p class="empty">No chapter images found.</p>';
        return;
      }

      target.innerHTML = chapters.slice(0, 45).map((chapter, index) => {
        const number = index + 1;
        const title = stripHtml(chapter.title || `Chapter ${number}`);
        const href = chapter.href || `chapter.html?slug=${encodeURIComponent(chapter.slug || "")}`;
        const img = imagePath(chapter.cover || chapter.hero);
        return `
          <a class="tile" href="${href}" aria-label="Open Chapter ${number}: ${title}">
            <img src="${img}" alt="Chapter ${number}: ${title}" loading="${number <= 6 ? "eager" : "lazy"}">
            <span class="caption">
              <strong>${title}</strong>
              <span>Chapter ${number}</span>
            </span>
          </a>`;
      }).join("");
    }

    renderGallery();
  </script>
</body>
</html>
